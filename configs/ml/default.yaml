# Example ML pipeline config. For TEST fixture: set data_dir to tests/fixtures (repo root).
symbol: TEST
symbols: [TEST]
groupby_symbol: false
timeframe: daily
data_dir: tests/fixtures

# Optional: per-row sample weights for XGBoost (v0.5).
# sampling:
#   strategy: none          # none | uniqueness | bootstrap
#   random_state: 42       # bootstrap draw seed (defaults to top-level random_state)
#   n_draw: null            # bootstrap only: rows drawn with replacement (default = n training rows)

# Optional: aggregate raw OHLCV before triple-barrier + features (tick / volume / dollar).
# information_bars:
#   enabled: true
#   bar_type: tick
#   threshold: 5
#   source_timeframe: daily

# Optional: volatility regime bucket as a feature (see docs/DATA_SCHEMA.md §14).
# regime:
#   enabled: false
#   window: 20
#   n_buckets: 3
#   use_hmm: false
#   groupby: false        # true: train one bundle per vol_regime under regime_<k>/ + regime_index.json (§15)

task: binary
random_state: 42
importance_repeats: 3

walk_forward:
  n_folds: 4
  min_train: 50
  test_size: null

# Walk-forward hyperparameter search (CLI ``wf-tune``). Uses ``expand_grid`` on dict ``grid``;
# or set ``grid`` to a list of explicit XGBoost param dicts. Optional ``n_folds`` overrides the
# walk-forward fold count passed to the tuner (defaults to ``walk_forward.n_folds``).
wf_tuner:
  metric: accuracy
  n_folds: 2
  grid:
    max_depth: [2, 3]

triple_barrier:
  upper_pct: 0.02
  lower_pct: 0.02
  vertical_bars: 5

indicators:
  - name: rsi
    period: 14
  - name: sma
    period: 20

cv:
  n_splits: 3
  embargo: 1

# Optional: meta-label logistic after `oof` (see docs/DATA_SCHEMA.md §13).
# meta_label:
#   n_splits: 3
#   embargo: 1
#   threshold: 0.5

model:
  out_dir: models/xgboost/latest
  xgb:
    n_estimators: 30
    max_depth: 3
    learning_rate: 0.1
