# TEST fixture: triple-barrier mix so meta-label z = (oof_pred == y) is non-degenerate.
# Run: train → oof → meta-train (same config).
symbol: TEST
symbols: [TEST]
groupby_symbol: false
timeframe: daily
data_dir: tests/fixtures
task: binary
random_state: 42
importance_repeats: 3
walk_forward:
  n_folds: 4
  min_train: 50
  test_size: null
wf_tuner:
  metric: accuracy
  n_folds: 2
  grid:
    max_depth: [2, 3]
triple_barrier:
  upper_pct: 0.008
  lower_pct: 0.008
  vertical_bars: 1
indicators:
  - name: rsi
    period: 14
  - name: sma
    period: 20
cv:
  n_splits: 3
  embargo: 1
model:
  out_dir: models/xgboost/meta_smoke
  xgb:
    n_estimators: 12
    max_depth: 2
    learning_rate: 0.15
