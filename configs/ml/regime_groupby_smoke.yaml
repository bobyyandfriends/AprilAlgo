# TEST fixture: regime feature + per-bucket bundles for `shap --per-regime`.
symbol: TEST
symbols: [TEST]
groupby_symbol: false
timeframe: daily
data_dir: tests/fixtures
regime:
  enabled: true
  window: 10
  n_buckets: 3
  use_hmm: false
  groupby: true
task: binary
random_state: 42
importance_repeats: 3
walk_forward:
  n_folds: 4
  min_train: 50
  test_size: null
wf_tuner:
  metric: accuracy
  n_folds: 2
  grid:
    max_depth: [2, 3]
triple_barrier:
  upper_pct: 0.02
  lower_pct: 0.02
  vertical_bars: 5
indicators:
  - name: rsi
    period: 14
  - name: sma
    period: 20
cv:
  n_splits: 3
  embargo: 1
model:
  out_dir: models/xgboost/regime_smoke
  xgb:
    n_estimators: 25
    max_depth: 3
    learning_rate: 0.1
