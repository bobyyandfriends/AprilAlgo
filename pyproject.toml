[project]
name = "aprilalgo"
version = "0.2.0"
description = "A Python data science and analysis project"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
dependencies = [
    "jupyter>=1.1.1",
    "massive>=2.4.0",
    "matplotlib>=3.10.8",
    "numpy>=2.4.4",
    "pandas>=3.0.1",
    "plotly>=6.6.0",
    "pyyaml>=6.0.3",
    "scipy>=1.17.1",
    "streamlit>=1.56.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aprilalgo"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
